services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docvanta_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./DOCVANTA_bcakend
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./DOCVANTA_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
